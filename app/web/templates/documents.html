{% extends "base.html" %}
{% block title %}Dateien · Second Brain{% endblock %}
{% block content %}
<h1 class="page-head">📎 Dateien</h1>

{% if not documents %}
  <p class="empty">Noch keine Dateien.</p>
{% endif %}

<section class="docs">
{% for d in documents %}
  <div class="doc">
    <div class="doc-info">
      <a class="doc-name" href="/documents/{{ d.id }}">{{ d.filename }}</a>
      <form method="post" action="/documents/{{ d.id }}/note" class="doc-note-form">
        <input type="hidden" name="back" value="/documents">
        <input type="text" name="note" value="{{ d.note or '' }}" placeholder="💬 Kommentar…">
        <button class="btn" title="Kommentar speichern">💾</button>
      </form>
    </div>
    <span class="doc-size">{{ d.size_display }}</span>
    <form method="post" action="/documents/{{ d.id }}/project" class="doc-move">
      <select name="project" onchange="this.form.submit()">
        <option value="none" {{ 'selected' if not d.project_id else '' }}>— Ohne Projekt</option>
        {% for p in projects %}
        <option value="{{ p.id }}" {{ 'selected' if d.project_id == p.id else '' }}>📁 {{ p.name }}</option>
        {% endfor %}
      </select>
    </form>
    <form method="post" action="/documents/{{ d.id }}/delete"
          onsubmit="return confirm('Datei {{ d.filename }} löschen?')">
      <button class="btn danger">🗑</button>
    </form>
  </div>
{% endfor %}
</section>
{% endblock %}
