services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: secondbrain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secondbrain}
      POSTGRES_DB: secondbrain
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs once, on first init of an empty data volume (all files, in order):
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secondbrain -d secondbrain"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      # Override host to reach the db service on the compose network.
      DATABASE_URL: postgresql://secondbrain:${POSTGRES_PASSWORD:-secondbrain}@db:5432/secondbrain
    volumes:
      # Persist the downloaded embedding model between restarts.
      - hf_cache:/root/.cache/huggingface
      # Uploaded documents (shared with the web service).
      - docdata:/data/documents

  # Web dashboard: same image, runs the FastAPI app instead of the bot.
  web:
    build: .
    restart: unless-stopped
    command: uvicorn app.web.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://secondbrain:${POSTGRES_PASSWORD:-secondbrain}@db:5432/secondbrain
    ports:
      # Host 8001 (8000 may be taken by another project); container stays 8000.
      - "8001:8000"
    volumes:
      # Shared model cache (lazy re-embedding on text edits).
      - hf_cache:/root/.cache/huggingface
      # Uploaded documents (shared with the bot).
      - docdata:/data/documents

volumes:
  pgdata:
  hf_cache:
  docdata:
